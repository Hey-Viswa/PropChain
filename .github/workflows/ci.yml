name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (types · lint · unit · build)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Dummy build-time values — no real services are contacted during CI.
      # The canonical Clerk example publishable key (decodes to clerk.example.com$).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: sk_test_ci_placeholder_secret_key_value
      MONGODB_URI: mongodb://127.0.0.1:27017/propchain_ci
      NEXT_PUBLIC_CHAIN_ID: "31337"
      BLOCKCHAIN_RPC_URL: http://127.0.0.1:8545
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit
      - name: Production build
        run: npm run build

  contracts:
    name: Contracts (compile · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: blockchain/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Compile
        run: npx hardhat compile
      - name: Test
        run: npx hardhat test
